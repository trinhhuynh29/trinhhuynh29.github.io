<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký tài khoản</title>

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <form id="registerForm" onsubmit="return validateForm()">
        <h2>Đăng ký tài khoản</h2>

        <div class="form-group">
            <label for="username">Tên đăng nhập <span class="required">*</span></label>
            <input type="text" id="username" name="username" placeholder="Nhập tên đăng nhập" required>
        </div>

        <div class="form-group">
            <label for="lastname">Họ và tên đệm <span class="required">*</span></label>
            <input type="text" id="lastname" name="lastname" placeholder="Nhập họ và tên đệm" required>
        </div>

        <div class="form-group">
            <label for="firstname">Tên <span class="required">*</span></label>
            <input type="text" id="firstname" name="firstname" placeholder="Nhập tên" required>
        </div>

        <div class="form-group">
            <label for="birthday">Ngày sinh <span class="required">*</span></label>
            <input type="date" id="birthday" name="birthday" required onchange="validateAge()">
        </div>

        <div class="form-group">
            <label for="password">Mật khẩu <span class="required">*</span></label>
            <input type="password" id="password" name="password"
                   placeholder="Nhập mật khẩu"
                   required minlength="8"
                   pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}">
        </div>

        <div class="form-group">
            <label for="confirm_password">Xác nhận mật khẩu <span class="required">*</span></label>
            <input type="password" id="confirm_password" name="confirm_password"
                   placeholder="Xác nhận mật khẩu"
                   required minlength="8">
        </div>

        <div class="button-group">
            <button type="submit" class="submit-btn">Đăng ký</button>
            <button type="reset" class="cancel-btn">Hủy bỏ</button>
        </div>

    </form>

    <script src="js/script.js"></script>
</body>
</html>
